<!DOCTYPE html>
<html lang="ja" data-theme="cupcake">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link href="/static/css/output.css" rel="stylesheet">

    <!--
        module スクリプトは defer 扱いのため、後続の defer Alpine より先に実行される。
        alpine:init リスナーを登録 → Alpine が初期化時に発火 → Alpine.data() が登録される。
    -->
    <script type="module">
        import { Question } from '/static/js/model.js';

        document.addEventListener('alpine:init', () => {
            Alpine.data('questionBoard', () => ({
                questions: [],
                questionIDMap: new Map([]),
                filter: '',
                connected: false,

                form: {content: '', due: '' },
                submitting: false,
                formError: '',

                currentView: 'home',

                questionDetail: {},

                async getQuestionDetail(id) {
                    const res = await fetch(`/api/v1/question/${id}`);
                    const body = await res.json();
                    this.questionDetail = Question.fromJSON(body);
                },

                async deleteQuestion(id) {
                    const res = await fetch(`/api/v1/question/${id}`, {
                        method: "DELETE"
                    }).then(v => {
                        if (v.status == 200) {
                            this.questions = this.questions.filter(q => q.id != id);
                            this.closeDetail()
                        } else {
                            this.formError = '質問データの削除に失敗しました。'
                        }
                    });
                },

                openDetail(id) {
                    this.getQuestionDetail(id)
                    document.getElementById('question-detail-modal').showModal();
                },
                closeDetail() {
                    document.getElementById('question-detail-modal').close();
                },

                openForm() {
                    this.form = { title: '', content: '', due: '' };
                    this.formError = '';
                    document.getElementById('question-form-modal').showModal();
                },
                closeForm() {
                    document.getElementById('question-form-modal').close();
                },
                async submitForm() {
                    if (!this.form.content.trim()) {
                        this.formError = '内容を入力してください';
                        return;
                    }
                    this.submitting = true;
                    this.formError = '';
                    try {
                        const body = { content: this.form.content.trim(), title: this.form.title.trim() };
                        if (this.form.due) body.due = `${this.form.due}:00+09:00`;
                        const res = await fetch('/api/v1/question', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(body),
                        });
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        this.closeForm();
                    } catch (err) {
                        this.formError = `送信に失敗しました (${err.message})`;
                    } finally {
                        this.submitting = false;
                    }
                },

                get filteredQuestions() {
                    const f = this.filter.toLowerCase().trim();
                    if (!f) return this.questions;
                    return this.questions.filter(q =>
                        q.title.toLowerCase().includes(f) ||
                        (q.tags ?? []).some(t => t.title.toLowerCase().includes(f))
                    );
                },

                isIncludeMap(id) {
                    return this.questionIDMap[id] == undefined ? false : true;
                },

                init() {
                    const es = new EventSource('/sse');
                    es.onopen = () => { this.connected = true; };
                    es.onerror = () => { this.connected = false; };
                    es.addEventListener('question', (e) => {
                        try {
                            const q = Question.fromJSON(JSON.parse(e.data));
                            if (!this.isIncludeMap(q.id)) {
                                this.questionIDMap[q.id] = true;
                                this.questions.unshift(q);
                            }
                        } catch (err) {
                            console.error('Failed to parse question:', err);
                        }
                    });
                },

                formatDate(d) {
                    if (!d) return null;
                    return new Intl.DateTimeFormat('ja-JP', {
                        year: 'numeric', month: '2-digit', day: '2-digit',
                        hour: '2-digit', minute: '2-digit',
                    }).format(new Date(d));
                },
            }));
        });
    </script>

    <script defer src="/static/vendor/htmx.min.js"></script>
    <script defer src="/static/vendor/sse.min.js"></script>
    <script defer src="/static/vendor/alpine.min.js"></script>
</head>

<body class="min-h-screen bg-base-200">

    <!-- ========== ヘッダー ========== -->
    <header class="sticky top-0 z-10 bg-base-100 shadow-sm">
        <div class="max-w-6xl mx-auto px-6 py-3 flex items-center justify-between gap-4">

            <h1 class="text-xl font-bold text-primary tracking-tight">Question Board</h1>

            <div class="flex items-center gap-3">
                <!-- 接続状態インジケーター -->
                <div x-data x-cloak class="hidden"><!-- Alpine 読み込み前の FOUC 防止 --></div>

                <!-- サーバー時刻 (htmx SSE) -->
                <div hx-ext="sse" sse-connect="/sse">
                    <span class="font-mono text-sm text-base-content/60" sse-swap="time-tick" hx-swap="innerHTML">
                        --:--:--
                    </span>
                </div>
            </div>

        </div>
    </header>

    <!-- ========== メインコンテンツ ========== -->
    <main class="max-w-6xl mx-auto px-6 py-8" x-data="questionBoard()" x-init="init()">
        <!-- ---- フィルターバー ---- -->
        <div class="mb-6 flex flex-col sm:flex-row items-stretch sm:items-center gap-3 flex-wrap">

            <!-- 検索ボックス -->
            <label class="flex-1 input input-bordered flex items-center gap-2">
                <!-- search icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0 opacity-50" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" />
                </svg>
                <input type="text" x-model="filter" placeholder="タイトル・タグで絞り込み..."
                    class="grow outline-none bg-transparent text-sm" />
                <!-- クリアボタン -->
                <button x-show="filter !== ''" @click="filter = ''" class="btn btn-ghost btn-xs btn-circle"
                    aria-label="クリア">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </label>

            <!-- 質問追加ボタン -->
            <button @click="openForm()" class="btn btn-primary btn-sm gap-1.5 shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                </svg>
                質問を追加
            </button>

            <!-- 件数バッジ + 接続状態 -->
            <div class="flex items-center gap-2 shrink-0">
                <span class="badge badge-primary badge-outline font-mono"
                    x-text="`${filteredQuestions.length} 件`"></span>

                <!-- 接続インジケーター -->
                <div class="flex items-center gap-1 text-xs" :class="connected ? 'text-success' : 'text-error'">
                    <span class="inline-block w-2 h-2 rounded-full animate-pulse"
                        :class="connected ? 'bg-success' : 'bg-error'"></span>
                    <span x-text="connected ? 'LIVE' : 'disconnected'"></span>
                </div>
            </div>

        </div>

        <!-- ---- カードグリッド ---- -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">

            <template x-for="q in filteredQuestions" :key="q.id">
                <div x-transition:enter="transition ease-out duration-300"
                    x-transition:enter-start="opacity-0 scale-95 translate-y-2"
                    x-transition:enter-end="opacity-100 scale-100 translate-y-0"
                    x-transition:leave="transition ease-in duration-200"
                    x-transition:leave-start="opacity-100 scale-100 translate-y-0"
                    x-transition:leave-end="opacity-0 scale-95 translate-y-2"
                    class="card bg-base-100 shadow hover:shadow-lg transition-shadow duration-200 cursor-pointer"
                    @click="openDetail(q.id)">
                    <div class="card-body gap-3 p-5">

                        <!-- タイトル + ID -->
                        <div class="flex items-start justify-between gap-2">
                            <h2 class="card-title text-sm leading-snug" x-text="q.title"></h2>
                            <span class="badge badge-ghost badge-sm shrink-0 font-mono" x-text="`#${q.id}`"></span>
                        </div>

                        <div class="flex items-start gap-2">
                            <span x-text="q.content"></span>
                        </div>

                        <!-- 期限 -->
                        <template x-if="q.due">
                            <div class="flex items-center gap-1 text-xs text-warning font-medium">
                                <!-- clock icon -->
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 shrink-0" fill="none"
                                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0z" />
                                </svg>
                                <span x-text="`期限: ${formatDate(q.due)}`"></span>
                            </div>
                        </template>

                        <!-- サポートステータス -->
                        <template x-if="q.support && q.support.supportStatus">
                            <div class="flex items-center gap-1 text-xs">
                                <!-- tag icon -->
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 shrink-0 opacity-60"
                                    fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M7 7h.01M7 3h14a1 1 0 0 1 1 1v9.586a1 1 0 0 1-.293.707l-7 7a1 1 0 0 1-1.414 0l-9.586-9.586A1 1 0 0 1 3 11V4a1 1 0 0 1 1-1h3z" />
                                </svg>
                                <span class="badge badge-secondary badge-sm"
                                    x-text="q.support.supportStatus.title"></span>
                            </div>
                        </template>

                        <!-- タグ一覧 -->
                        <template x-if="q.tags && q.tags.length > 0">
                            <div class="flex flex-wrap gap-1">
                                <template x-for="tag in q.tags" :key="tag.id">
                                    <span class="badge badge-outline badge-xs" x-text="tag.title"></span>
                                </template>
                            </div>
                        </template>

                        <!-- フッター: 作成日時 -->
                        <div class="mt-auto pt-2 border-t border-base-200 flex justify-end">
                            <span class="text-xs text-base-content/40 font-mono"
                                x-text="formatDate(q.createdAt)"></span>
                        </div>

                    </div>
                </div>
            </template>

        </div>

        <!-- ---- 空状態 ---- -->
        <div x-show="filteredQuestions.length === 0" x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0"
            x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100"
            x-transition:leave-end="opacity-0"
            class="flex flex-col items-center justify-center py-24 gap-4 text-base-content/40">

            <!-- フィルター結果なし -->
            <template x-if="filter !== ''">
                <div class="flex flex-col items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 opacity-30" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" />
                    </svg>
                    <p class="text-sm">「<span class="font-semibold" x-text="filter"></span>」に一致する Question が見つかりません</p>
                    <button @click="filter = ''" class="btn btn-ghost btn-xs mt-1">
                        フィルターをクリア
                    </button>
                </div>
            </template>

            <!-- SSE 待機中 -->
            <template x-if="filter === '' && questions.length === 0">
                <div class="flex flex-col items-center gap-3">
                    <span class="loading loading-ring loading-lg text-primary opacity-50"></span>
                    <p class="text-sm">SSE から Question を待機中...</p>
                </div>
            </template>

        </div>

        <!-- ---- 質問入力モーダル ---- -->
        <dialog id="question-form-modal" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box" x-transition:enter="transition ease-out duration-200"
                x-transition:enter-start="opacity-0 scale-95 translate-y-4"
                x-transition:enter-end="opacity-100 scale-100 translate-y-0"
                x-transition:leave="transition ease-in duration-150"
                x-transition:leave-start="opacity-100 scale-100 translate-y-0"
                x-transition:leave-end="opacity-0 scale-95 translate-y-4">

                <!-- ヘッダー -->
                <div class="flex items-center justify-between mb-5">
                    <h3 class="font-bold text-lg">質問を追加</h3>
                    <button @click="closeForm()" class="btn btn-ghost btn-sm btn-circle" aria-label="閉じる">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>

                <!-- フォーム -->
                <form @submit.prevent="submitForm()" class="flex flex-col gap-4" novalidate>
                    <!-- タイトル -->
                    <label class="form-control">
                        <div class="label pb-1">
                            <span class="label-text font-medium">
                                タイトル
                                <span class="text-error ml-0.5">*</span>
                            </span>
                        </div>
                        <textarea x-model="form.title" placeholder="質問のタイトルを入力..." rows="3"
                            class="textarea textarea-bordered w-full resize-none focus:outline-none"
                            :class="formError && !form.title.trim() ? 'textarea-error' : ''"
                            :disabled="submitting"></textarea>
                    </label>

                    <!-- 内容 -->
                    <label class="form-control">
                        <div class="label pb-1">
                            <span class="label-text font-medium">
                                内容
                                <span class="text-error ml-0.5">*</span>
                            </span>
                        </div>
                        <textarea x-model="form.content" placeholder="質問の内容を入力..." rows="3"
                            class="textarea textarea-bordered w-full resize-none focus:outline-none"
                            :class="formError && !form.content.trim() ? 'textarea-error' : ''"
                            :disabled="submitting"></textarea>
                    </label>

                    <!-- 期日 -->
                    <label class="form-control">
                        <div class="label pb-1">
                            <span class="label-text font-medium">期日</span>
                            <span class="label-text-alt text-base-content/40">任意</span>
                        </div>
                        <input type="datetime-local" x-model="form.due"
                            class="input input-bordered w-full focus:outline-none" :disabled="submitting" />
                    </label>

                    <!-- エラーメッセージ -->
                    <div x-show="formError !== ''" x-transition:enter="transition ease-out duration-200"
                        x-transition:enter-start="opacity-0 -translate-y-1"
                        x-transition:enter-end="opacity-100 translate-y-0" class="alert alert-error py-2 text-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
                        </svg>
                        <span x-text="formError"></span>
                    </div>

                    <!-- アクション -->
                    <div class="modal-action mt-1">
                        <button type="button" @click="closeForm()" class="btn btn-ghost" :disabled="submitting">
                            キャンセル
                        </button>
                        <button type="submit" class="btn btn-primary gap-2" :disabled="submitting">
                            <span x-show="submitting" class="loading loading-spinner loading-xs"></span>
                            <span x-text="submitting ? '送信中...' : '送信'"></span>
                        </button>
                    </div>

                </form>
            </div>

            <!-- バックドロップクリックで閉じる -->
            <form method="dialog" class="modal-backdrop">
                <button @click="closeForm()">close</button>
            </form>
        </dialog>

        <!-- ---- 詳細モーダル ---- -->
        <dialog id="question-detail-modal" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box" x-transition:enter="transition ease-out duration-200"
                x-transition:enter-start="opacity-0 scale-95 translate-y-4"
                x-transition:enter-end="opacity-100 scale-100 translate-y-0"
                x-transition:leave="transition ease-in duration-150"
                x-transition:leave-start="opacity-100 scale-100 translate-y-0"
                x-transition:leave-end="opacity-0 scale-95 translate-y-4">

                <div class="flex items-center justify-between mb-5">
                    <span class="card-title" x-text="questionDetail.title"></span>
                </div>
                <hr />

                <div class="flex items-center justify-between mb-2">
                    <span class="card-body" x-text="questionDetail.content"></span>
                </div>

                <div class="flex items-center justify-between mb-5">
                    <textarea name="raw-json" id="raw-json" rows="30" cols="50"
                        x-text="JSON.stringify(questionDetail)"></textarea>
                </div>

                <!-- エラーメッセージ -->
                <div x-show="formError !== ''" x-transition:enter="transition ease-out duration-200"
                    x-transition:enter-start="opacity-0 -translate-y-1"
                    x-transition:enter-end="opacity-100 translate-y-0" class="alert alert-error py-2 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
                    </svg>
                    <span x-text="formError"></span>
                </div>

                <div class="flex items-end justify-between mb-5">
                    <button class="btn btn-circle" @click="deleteQuestion(questionDetail.id)">削除</button>
                </div>
            </div>

            <!-- バックドロップクリックで閉じる -->
            <form method="dialog" class="modal-backdrop">
                <button @click="closeDetail()">close</button>
            </form>
        </dialog>
    </main>

</body>

</html>
