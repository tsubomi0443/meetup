<!DOCTYPE html>
<html lang="ja" data-theme="cupcake">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link href="/static/css/output.css" rel="stylesheet">
    
    <!-- Alpine.js & htmx -->
    <script defer src="/static/vendor/htmx.min.js"></script>
    <script defer src="/static/vendor/sse.min.js"></script>
    <script defer src="/static/vendor/alpine.min.js"></script>
</head>
<body class="p-10 flex flex-col gap-5 items-center bg-base-200 min-h-screen">

    <div class="card w-96 bg-base-100 shadow-xl">
        <div class="card-body">
            <h2 class="card-title text-primary">Go + Echo + Tailwind v3 + daisyUI</h2>
            
            <!-- Alpine.js: カウンター -->
            <div x-data="{ count: 0 }" class="py-4">
                <button @click="count++" class="btn btn-outline w-full">
                    Alpine.js Count: <span x-text="count" class="badge badge-secondary"></span>
                </button>
            </div>
            
            <!-- SSE: time-tick イベントを受信して時刻を表示 -->
            <div hx-ext="sse" sse-connect="/sse" class="py-4">
                <div class="text-center">
                    <span class="text-xs text-base-content/50 uppercase tracking-widest">Server Time</span>
                    <div sse-swap="time-tick"
                         hx-swap="innerHTML"
                         class="font-mono text-2xl font-bold text-secondary mt-1">
                        --:--:--
                    </div>
                </div>
            </div>

            <!-- htmx: ボタンクリックでGo APIから結果を取得 -->
            <button hx-get="/api/joke" 
                    hx-target="#joke-result" 
                    class="btn btn-primary">
                htmx でジョークを取得（Go API経由）
            </button>
            <div id="joke-result" class="mt-4 text-sm italic opacity-70 text-center">
                (ここに結果が表示されます)
            </div>
        </div>
    </div>

</body>
</html>
