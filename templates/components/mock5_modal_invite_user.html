{{define "mock5_modal_invite_user"}}
<div class="modal" :class="{'modal-open': showAddUserModal}"
    x-data="{ email: '', name: '', pass: '', role: '3', roleName: 'Staff', selectOptionTitle(event) {
        this.roleName = event.target.options[event.target.selectedIndex].text;
    }}">
    <div class="modal-box bg-white rounded-2xl shadow-2xl">
        <h3 class="font-bold text-lg mb-6 tracking-tight">新規ユーザーを招待</h3>
        <div class="space-y-4">
            <input type="text" placeholder="氏名" class="input input-bordered w-full text-sm shadow-inner"
                x-model="name" />
            <input type="email" placeholder="メールアドレス" class="input input-bordered w-full text-sm shadow-inner"
                x-model="email" />
            <div x-data="{ show: false }" class="relative flex items-center mt-2">
                <input type="password" placeholder="初期パスワード" class="input input-bordered w-full text-sm shadow-inner"
                    :type="show ? 'text' : 'password'" x-model="pass" />
                <button type="button"
                    class="absolute right-2 bg-transparent flex items-center justify-center hover:text-blue-600"
                    @click="show = !show">
                    <svg x-show="!show" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21">
                        </path>
                    </svg>
                    <svg x-show="show" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg" style="display: none;">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                        </path>
                    </svg>
                </button>
            </div>
            <select class="select select-bordered w-full text-sm font-bold shadow-inner" x-model="role" @change="selectOptionTitle($event)">
                <option selected disabled>役割を選択</option>
                <option value="3">Staff</option>
                <option value="2">Manager</option>
            </select>
        </div>
        <div class="modal-action">
            <button class="btn btn-ghost font-bold" @click="showAddUserModal = false">キャンセル</button>
            <button class="btn bg-slate-400 border-none font-bold px-8 shadow-md" :disabled="(email && name && pass && role) ? false : true"
                @click="showAddUserModal = false; registerUser(email, name, pass, role, roleName); email= ''; name= ''; pass= ''; role= '3'; roleName= 'Staff'; alert('ユーザーを登録しました')">招待を送信</button>
        </div>
    </div>
</div>
<div class="modal-backdrop bg-gray-900 bg-opacity-50" @click="showAddUserModal = false"></div>
{{end}}
