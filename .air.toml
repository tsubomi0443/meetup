[misc]
  # 終了時に一時ファイルを削除
  clean_on_exit = true

[build]
  # 起動前にTailwindをビルド + vendorコピー
  pre_cmd = ["bun run --cwd frontend build"]
  include_file = ["frontend/package.json", "./.env", "./.air.toml"]
  exclude_dir = ["frontend/node_modules", "static/vendor"]
  # Goのビルド
  cmd = "go build -o ./tmp/main ."
  # プロセス停止時の待機時間（ミリ秒）
  kill_delay = 1000

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"